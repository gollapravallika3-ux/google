<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Clone</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:space-between;
        background:#fff;
    }

    /* Header */
    header{
        display:flex;
        justify-content:flex-end;
        align-items:center;
        padding:15px 25px;
        gap:20px;
    }

    header a{
        text-decoration:none;
        color:#202124;
        font-size:14px;
    }

    header a:hover{
        text-decoration:underline;
    }

    .profile{
        width:35px;
        height:35px;
        border-radius:50%;
        background:#4285f4;
        color:#fff;
        display:flex;
        align-items:center;
        justify-content:center;
        font-weight:bold;
        cursor:pointer;
    }

    /* Main */
    main{
        display:flex;
        flex-direction:column;
        align-items:center;
        margin-top:-120px;
    }

    .logo{
        font-size:90px;
        font-weight:bold;
        margin-bottom:25px;
    }

    .blue{color:#4285F4;}
    .red{color:#EA4335;}
    .yellow{color:#FBBC05;}
    .green{color:#34A853;}

    .search-box{
        width:600px;
        max-width:90%;
        border:1px solid #dfe1e5;
        border-radius:30px;
        padding:12px 20px;
        font-size:16px;
        outline:none;
    }

    .search-box:hover,
    .search-box:focus{
        box-shadow:0 1px 6px rgba(32,33,36,0.28);
    }

    .buttons{
        margin-top:30px;
    }

    .buttons button{
        background:#f8f9fa;
        border:1px solid #f8f9fa;
        padding:10px 18px;
        margin:5px;
        cursor:pointer;
        border-radius:4px;
        font-size:14px;
    }

    .buttons button:hover{
        border:1px solid #dadce0;
    }

    .language{
        margin-top:25px;
        font-size:14px;
    }

    .language a{
        text-decoration:none;
        color:#1a0dab;
    }

    /* Footer */
    footer{
        background:#f2f2f2;
        padding:15px 30px;
        color:#70757a;
        font-size:14px;
    }

    .footer-links{
        display:flex;
        justify-content:space-between;
        flex-wrap:wrap;
        margin-top:10px;
    }

    .footer-links div a{
        text-decoration:none;
        color:#70757a;
        margin-right:20px;
    }

    .footer-links div a:hover{
        text-decoration:underline;
    }
</style>
</head>
<body>

<header>
    <a href="#">Gmail</a>
    <a href="#">Images</a>
    <div class="profile">P</div>
</header>

<main>
      <img = src="worldcup.gif" alt="Google">

    <input type="text" class="search-box" placeholder="Search Google or type a URL">

    <div class="buttons">
        <button>Google Search</button>
        <button>I'm Feeling Lucky</button>
    </div>
     

    <div class="language">
        Google offered in:
        <a href="#">తెలుగు</a>
        <a href="#">हिन्दी</a>
        <a href="#">தமிழ்</a>
    </div>
</main>

<footer>
    <p>India</p>
    <div class="footer-links">
        <div>
            <a href="#">About</a>
            <a href="#">Advertising</a>
            <a href="#">Business</a>
        </div>
        <div>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Settings</a>
        </div>
    </div>
</footer>

</body>
</html>
